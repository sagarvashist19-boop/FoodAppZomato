apiVersion: apps/v1
kind: Deployment
metadata:
  name: zomato-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zomato
  template:
    metadata:
      labels:
        app: zomato
    spec:
      containers:
      - name: zomato-container
        image: 070203626273.dkr.ecr.us-east-1.amazonaws.com/zomatoapp:latest
        ports:
        - containerPort: 3000

